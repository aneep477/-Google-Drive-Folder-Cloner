<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="glass-card p-10 rounded-[2.5rem] w-full max-w-md mx-4 transition-all hover:border-blue-500/30">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white tracking-tight">Drive Cloner <span class="text-blue-500">Pro</span></h1>
            <p class="text-gray-400 mt-2 text-sm">Klon folder Google Drive dengan pantas</p>
        </div>

        <div class="space-y-5">
            <div>
                <label class="block text-xs font-semibold text-blue-400 uppercase tracking-wider mb-2 ml-1">Folder Sumber (ID/Link)</label>
                <input type="text" id="source" placeholder="Tampal link folder asal..." 
                       class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all placeholder:text-gray-600">
            </div>
            
            <div>
                <label class="block text-xs font-semibold text-blue-400 uppercase tracking-wider mb-2 ml-1">Folder Sasaran (ID/Link)</label>
                <input type="text" id="target" placeholder="Tampal link folder tujuan..." 
                       class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all placeholder:text-gray-600">
            </div>

            <button onclick="startCopy()" id="btnAction"
                    class="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-500/20 transition-all transform active:scale-[0.98]">
                Mula Salin Sekarang
            </button>
        </div>
        
        <p id="status" class="text-center text-xs text-gray-500 mt-6 hidden italic"></p>
    </div>

    <script>
        function startCopy() {
            const source = document.getElementById('source').value;
            const target = document.getElementById('target').value;
            const btn = document.getElementById('btnAction');
            const statusText = document.getElementById('status');

            if (!source || !target) {
                alert("⚠️ Sila masukkan kedua-dua URL folder!");
                return;
            }

            // UI Feedback
            btn.disabled = true;
            btn.innerText = "⚡ Menyambung ke Server...";
            statusText.classList.remove('hidden');
            statusText.innerText = "Sila tunggu, arahan sedang dihantar...";

            // Bina URL API (Auto-detect pautan semasa)
            const scriptUrl = window.location.href.split('?')[0];
            const finalUrl = `${scriptUrl}?source=${encodeURIComponent(source)}&target=${encodeURIComponent(target)}`;

            // Teknik Image Beacon untuk kestabilan penghantaran data
            const img = new Image();
            img.src = finalUrl;
            
            // Beri sedikit delay sebelum tunjuk success (kerana proses script ambil masa)
            setTimeout(() => {
                alert("✅ Arahan Diterima!\nSila semak folder sasaran anda sebentar lagi.");
                btn.disabled = false;
                btn.innerText = "Mula Salin Sekarang";
                statusText.innerText = "Tugasan terakhir berjaya dihantar.";
            }, 2500);
        }
    </script>
</body>
</html>

    <script src="./script.js"></script>
  </body>
</html>
