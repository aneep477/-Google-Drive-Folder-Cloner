<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body { background: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .main-card { max-width: 700px; margin: 50px auto; border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
    .header-section { background: linear-gradient(135deg, #4285F4, #34A853); color: white; padding: 40px; text-align: center; }
    .content-section { background: white; padding: 40px; }
    #progressBarContainer { display: none; }
    .progress { height: 25px; border-radius: 50px; }
    #logBox { height: 120px; overflow-y: auto; background: #212529; color: #39FF14; font-family: monospace; font-size: 12px; padding: 10px; border-radius: 8px; margin-top: 15px; }
  </style>
</head>
<body>

<div class="container">
  <div class="card main-card">
    <div class="header-section">
      <i class="fab fa-google-drive fa-3x mb-3"></i>
      <h2>Drive Folder Cloner</h2>
      <p>Salin keseluruhan isi folder secara tersusun</p>
    </div>

    <div class="content-section">
      <div class="mb-4">
        <label class="form-label fw-bold"><i class="fas fa-link me-2"></i>URL Folder Sumber</label>
        <input type="text" id="urlSumber" class="form-control form-control-lg" placeholder="Tampal pautan folder yang ingin dicopy">
      </div>

      <div class="mb-4">
        <label class="form-label fw-bold"><i class="fas fa-folder-open me-2"></i>URL Folder Sasaran (Drive Anda)</label>
        <input type="text" id="urlTarget" class="form-control form-control-lg" placeholder="Tampal pautan folder destinasi anda">
      </div>

      <button id="btnMula" class="btn btn-primary btn-lg w-100 shadow-sm" onclick="jalankanProses()">
        <i class="fas fa-copy me-2"></i>Mula Salin Sekarang
      </button>

      <div id="progressBarContainer" class="mt-5">
        <div class="d-flex justify-content-between mb-2">
          <span id="statusTxt" class="fw-bold text-primary">Memproses...</span>
          <span id="percentTxt" class="fw-bold">0%</span>
        </div>
        <div class="progress">
          <div id="pBar" class="progress-bar progress-bar-striped progress-bar-animated bg-success" role="progressbar" style="width: 0%"></div>
        </div>
        <div id="logBox">Menunggu input...</div>
      </div>
    </div>
  </div>
</div>

<script>
  let isRunning = false;

  // Menghalang penutupan tab secara tidak sengaja
  window.onbeforeunload = function() {
    if (isRunning) return "Penyalinan sedang berjalan. Jika anda keluar, proses mungkin terhenti!";
  };

  function updateLog(msg) {
    const logBox = document.getElementById('logBox');
    logBox.innerHTML += `> ${msg}<br>`;
    logBox.scrollTop = logBox.scrollHeight;
  }

  function jalankanProses() {
    const s = document.getElementById('urlSumber').value;
    const t = document.getElementById('urlTarget').value;

    if(!s || !t) { alert("Sila masukkan kedua-dua URL!"); return; }

    isRunning = true;
    document.getElementById('btnMula').disabled = true;
    document.getElementById('progressBarContainer').style.display = 'block';
    updateLog("Menghubungi server Google...");

    google.script.run
      .withSuccessHandler((res) => {
        isRunning = false;
        document.getElementById('pBar').style.width = "100%";
        document.getElementById('percentTxt').innerText = "100%";
        document.getElementById('statusTxt').innerText = "SELESAI!";
        updateLog(`Berjaya menyalin folder: ${res.folderName}`);
        alert("Penyalinan Tamat dengan Berjaya!");
      })
      .withFailureHandler((err) => {
        isRunning = false;
        alert("Ralat: " + err.message);
        document.getElementById('btnMula').disabled = false;
        updateLog("Ralat berlaku: " + err.message);
      })
      .mulakanSalinan(s, t);

    // Animasi Progress Bar
    let w = 0;
    let interval = setInterval(() => {
      if (w < 95 && isRunning) {
        w += 1;
        document.getElementById('pBar').style.width = w + "%";
        document.getElementById('percentTxt').innerText = w + "%";
        if(w == 10) updateLog("Mengenalpasti struktur folder...");
        if(w == 40) updateLog("Menyalin fail-fail...");
        if(w == 70) updateLog("Menyalin sub-folder...");
      } else {
        clearInterval(interval);
      }
    }, 1500);
  }
</script>

</body>
</html>
